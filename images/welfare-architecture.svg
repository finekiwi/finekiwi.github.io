<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Inter, -apple-system, sans-serif">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;display=swap');
  </style>
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.06"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-auto">
      <path d="M0,0 L10,3.5 L0,7" fill="#B5B0AA"/>
    </marker>
    <marker id="arrow-teal" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-auto">
      <path d="M0,0 L10,3.5 L0,7" fill="#2D6A6A"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" fill="none"/>

  <!-- ==================== USER ==================== -->
  <g transform="translate(60, 220)">
    <circle cx="0" cy="-18" r="12" fill="none" stroke="#1A1A1A" stroke-width="2"/>
    <path d="M-18,18 Q-18,0 0,0 Q18,0 18,18" fill="none" stroke="#1A1A1A" stroke-width="2"/>
    <text x="0" y="42" text-anchor="middle" fill="#1A1A1A" font-size="12" font-weight="500">User</text>
  </g>

  <!-- Arrow: User → Streamlit -->
  <line x1="90" y1="220" x2="150" y2="220" stroke="#B5B0AA" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ==================== STREAMLIT ==================== -->
  <rect x="162" y="150" width="120" height="140" rx="10" fill="#FFFFFF" stroke="#2D6A6A" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="222" y="200" text-anchor="middle" fill="#2D6A6A" font-size="13" font-weight="600">Streamlit</text>
  <text x="222" y="218" text-anchor="middle" fill="#8A8A8A" font-size="10">Frontend</text>

  <!-- Arrow: Streamlit → LangGraph -->
  <line x1="282" y1="220" x2="340" y2="220" stroke="#B5B0AA" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="311" y="212" text-anchor="middle" fill="#8A8A8A" font-size="10">Query</text>

  <!-- ==================== LANGGRAPH CONTAINER ==================== -->
  <rect x="350" y="30" width="400" height="370" rx="12" fill="#F0F7F7" stroke="#2D6A6A" stroke-width="1.5" stroke-dasharray="6,3" filter="url(#shadow)"/>
  <text x="550" y="58" text-anchor="middle" fill="#2D6A6A" font-size="14" font-weight="600">LangGraph</text>
  <text x="550" y="74" text-anchor="middle" fill="#4A8E8E" font-size="10" font-weight="400">Orchestration</text>

  <!-- Rewrite Query -->
  <rect x="390" y="95" width="140" height="46" rx="6" fill="#FFFFFF" stroke="#E8E5E1" stroke-width="1.2"/>
  <text x="460" y="123" text-anchor="middle" fill="#1A1A1A" font-size="12" font-weight="500">Rewrite Query</text>

  <!-- Arrow: Rewrite → FAISS -->
  <line x1="460" y1="141" x2="460" y2="175" stroke="#B5B0AA" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- FAISS Vector DB -->
  <rect x="390" y="185" width="140" height="46" rx="6" fill="#FFFFFF" stroke="#2D6A6A" stroke-width="1.2"/>
  <text x="460" y="207" text-anchor="middle" fill="#2D6A6A" font-size="12" font-weight="600">FAISS</text>
  <text x="460" y="222" text-anchor="middle" fill="#8A8A8A" font-size="10">Vector Search</text>

  <!-- Arrow: FAISS → Ensemble -->
  <line x1="460" y1="231" x2="460" y2="265" stroke="#B5B0AA" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Ensemble Retrieval -->
  <rect x="380" y="275" width="280" height="50" rx="6" fill="#FFFFFF" stroke="#2D6A6A" stroke-width="1.5"/>
  <text x="520" y="296" text-anchor="middle" fill="#1A1A1A" font-size="12" font-weight="600">Ensemble Retrieval</text>
  <text x="520" y="314" text-anchor="middle" fill="#8A8A8A" font-size="10">FAISS (semantic) + BM25 (keyword)</text>

  <!-- BM25 -->
  <rect x="570" y="185" width="140" height="46" rx="6" fill="#FFFFFF" stroke="#2D6A6A" stroke-width="1.2"/>
  <text x="640" y="207" text-anchor="middle" fill="#2D6A6A" font-size="12" font-weight="600">BM25</text>
  <text x="640" y="222" text-anchor="middle" fill="#8A8A8A" font-size="10">Keyword Search</text>

  <!-- Arrow: BM25 → Ensemble -->
  <line x1="640" y1="231" x2="640" y2="265" stroke="#B5B0AA" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ==================== DATA SOURCES ==================== -->
  <!-- FaQ DB -->
  <rect x="790" y="105" width="90" height="40" rx="4" fill="#F8F8F6" stroke="#C5C0BA" stroke-width="1.3"/>
  <text x="835" y="130" text-anchor="middle" fill="#4A4A4A" font-size="11" font-weight="500">FAQ DB</text>

  <!-- Welfare DB -->
  <rect x="790" y="165" width="90" height="40" rx="4" fill="#F8F8F6" stroke="#C5C0BA" stroke-width="1.3"/>
  <text x="835" y="190" text-anchor="middle" fill="#4A4A4A" font-size="11" font-weight="500">Welfare DB</text>

  <!-- Arrows: DBs → FAISS/BM25 -->
  <line x1="790" y1="125" x2="530" y2="200" stroke="#B5B0AA" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="790" y1="185" x2="710" y2="200" stroke="#B5B0AA" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ==================== GPT API ==================== -->
  <!-- Arrow: Ensemble → GPT API -->
  <line x1="520" y1="325" x2="520" y2="415" stroke="#B5B0AA" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="450" y="425" width="140" height="50" rx="8" fill="#2D6A6A" stroke="none" filter="url(#shadow)"/>
  <text x="520" y="448" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="600">GPT API</text>
  <text x="520" y="465" text-anchor="middle" fill="#C5E0E0" font-size="10">Response Generation</text>

  <!-- ==================== ANSWER BACK ==================== -->
  <!-- Arrow: GPT → back to Streamlit -->
  <path d="M450,450 L222,450 L222,290" stroke="#2D6A6A" stroke-width="1.5" fill="none" marker-end="url(#arrow-teal)"/>
  <text x="336" y="468" text-anchor="middle" fill="#2D6A6A" font-size="10" font-weight="500">Answer</text>

</svg>